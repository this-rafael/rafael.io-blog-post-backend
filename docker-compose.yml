version: '3.8'

services:
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rafael-io-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_FILENAME: /data/strapi.db
    ports:
      - "1337:1337"
    volumes:
      - strapi-data:/data

volumes:
  strapi-data:
